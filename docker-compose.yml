name: ragproject

x-backend-env: &backend-env
  APP_ENV: local
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag}@postgres:5432/${POSTGRES_DB:-rag}}
  CORS_ALLOWED_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
  SESSION_SECRET: ${SESSION_SECRET:-change-me-in-local-env}
  SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-rag_session}
  CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-rag_csrf}
  SESSION_COOKIE_SECURE: "false"
  SESSION_COOKIE_SAMESITE: lax
  SESSION_COOKIE_MAX_AGE_SECONDS: "28800"
  STORAGE_ROOT: /app/storage/uploads
  UPLOAD_MAX_BYTES: "20971520"
  UPLOAD_ALLOWED_EXTENSIONS: '[".pdf",".docx",".txt",".md",".markdown",".csv",".xlsx",".pptx",".html",".htm",".xml"]'
  INGEST_OFFICE_MAX_PAGES: "200"
  INGEST_OFFICE_MAX_ROWS_PER_SHEET: "5000"
  INGEST_OFFICE_MAX_CELLS: "100000"
  INGEST_OFFICE_ROWS_PER_CHUNK: "25"
  INGEST_OFFICE_MAX_SLIDES: "300"
  TEMP_CHAT_TTL_MINUTES: "1440"
  JOB_LEASE_SECONDS: "300"
  WORKER_POLL_INTERVAL_MS: "1000"
  WORKER_BATCH_SIZE: "1"
  WORKER_LEASE_SECONDS: "300"
  WORKER_LEASE_RENEW_INTERVAL_SECONDS: "60"
  WORKER_SHUTDOWN_GRACE_SECONDS: "30"
  WORKER_ENABLED_JOB_TYPES: ${WORKER_ENABLED_JOB_TYPES:-all}
  INGEST_CHUNK_SIZE_TOKENS: "512"
  INGEST_CHUNK_OVERLAP_TOKENS: "128"
  INGEST_MAX_EXTRACTED_TEXT_CHARS: "5000000"
  INGEST_CHUNK_PREVIEW_CHARS: "200"
  LOG_LEVEL: INFO
  PII_MASKING_ENABLED: "true"
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-document_chunks_lmstudio}
  QDRANT_DISTANCE: Cosine
  QDRANT_CREATE_COLLECTION: "true"
  QDRANT_REQUIRED: "false"
  QDRANT_UPSERT_BATCH_SIZE: "64"
  QDRANT_TIMEOUT_SECONDS: "5"
  OLLAMA_URL: http://ollama:11434
  USE_FAKE_LLM: ${USE_FAKE_LLM:-false}
  MODEL_NAME: ${MODEL_NAME:-llama3.1}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-lmstudio}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
  EMBEDDING_VECTOR_DIMENSION: ${EMBEDDING_VECTOR_DIMENSION:-768}
  EMBEDDING_FAKE_DIMENSION: ${EMBEDDING_FAKE_DIMENSION:-8}
  EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
  RERANK_PROVIDER: ${RERANK_PROVIDER:-none}
  RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
  RETRIEVAL_CACHE_ENABLED: ${RETRIEVAL_CACHE_ENABLED:-false}
  RETRIEVAL_CACHE_NAMESPACE: ${RETRIEVAL_CACHE_NAMESPACE:-rag.retrieval}
  RETRIEVAL_CACHE_TTL_SECONDS: ${RETRIEVAL_CACHE_TTL_SECONDS:-300}
  GENERATION_PROVIDER: ${GENERATION_PROVIDER:-lmstudio}
  GENERATION_MODEL_NAME: ${GENERATION_MODEL_NAME:-qwen3.5-9b}
  GENERATION_MAX_CONTEXT_CHARS: ${GENERATION_MAX_CONTEXT_CHARS:-6000}
  GENERATION_MAX_OUTPUT_CHARS: ${GENERATION_MAX_OUTPUT_CHARS:-8000}
  GENERATION_MAX_OUTPUT_TOKENS: ${GENERATION_MAX_OUTPUT_TOKENS:-8192}
  GENERATION_PRICING_OVERRIDES: ${GENERATION_PRICING_OVERRIDES:-}
  LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
  LMSTUDIO_API_KEY: ${LMSTUDIO_API_KEY:-lm-studio}
  LMSTUDIO_TIMEOUT_SECONDS: ${LMSTUDIO_TIMEOUT_SECONDS:-600}
  LLM_ORCHESTRATOR_TIMEOUT_SECONDS: ${LLM_ORCHESTRATOR_TIMEOUT_SECONDS:-600}
  LANGCHAIN_AGENTIC_TIMEOUT_SECONDS: ${LANGCHAIN_AGENTIC_TIMEOUT_SECONDS:-600}
  GRAPH_RETRIEVAL_ENABLED: ${GRAPH_RETRIEVAL_ENABLED:-false}
  GRAPH_STORE_PROVIDER: ${GRAPH_STORE_PROVIDER:-postgres}
  GRAPH_RETRIEVAL_MAX_START_ENTITIES: ${GRAPH_RETRIEVAL_MAX_START_ENTITIES:-5}
  GRAPH_RETRIEVAL_MAX_DEPTH: ${GRAPH_RETRIEVAL_MAX_DEPTH:-2}
  GRAPH_RETRIEVAL_MAX_PATHS: ${GRAPH_RETRIEVAL_MAX_PATHS:-20}
  GRAPH_RETRIEVAL_MAX_RELATIONS_PER_ENTITY: ${GRAPH_RETRIEVAL_MAX_RELATIONS_PER_ENTITY:-20}
  GRAPH_RETRIEVAL_MAX_SOURCE_CHUNKS: ${GRAPH_RETRIEVAL_MAX_SOURCE_CHUNKS:-20}
  GRAPH_RETRIEVAL_TIMEOUT_MS: ${GRAPH_RETRIEVAL_TIMEOUT_MS:-3000}
  GRAPH_RETRIEVAL_FALLBACK_STRATEGY: ${GRAPH_RETRIEVAL_FALLBACK_STRATEGY:-hybrid}
  GRAPH_RETRIEVAL_MIN_ENTITY_MATCH_SCORE: ${GRAPH_RETRIEVAL_MIN_ENTITY_MATCH_SCORE:-0.5}
  GRAPH_ROUTER_ENABLED: ${GRAPH_ROUTER_ENABLED:-false}
  GRAPH_ROUTER_MIN_SIGNAL_SCORE: ${GRAPH_ROUTER_MIN_SIGNAL_SCORE:-0.5}
  NEO4J_URI: ${NEO4J_URI:-}
  NEO4J_USER: ${NEO4J_USER:-}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
  NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
  NEO4J_CONNECT_TIMEOUT_SECONDS: ${NEO4J_CONNECT_TIMEOUT_SECONDS:-3}
  NEO4J_HEALTH_CHECK_ENABLED: ${NEO4J_HEALTH_CHECK_ENABLED:-false}
  NEO4J_PROJECTION_ENABLED: ${NEO4J_PROJECTION_ENABLED:-false}

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"
      - "6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    profiles: ["neo4j"]
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change-me-local}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/7474'"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:0.5.7
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
      args:
        BACKEND_UV_EXTRA_ARGS: ${BACKEND_UV_EXTRA_ARGS:-}
    environment: *backend-env
    volumes:
      - upload_storage:/app/storage/uploads
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-m", "app.scripts.healthcheck", "http://127.0.0.1:8000/ready", "database"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: worker
      args:
        BACKEND_UV_EXTRA_ARGS: ${BACKEND_UV_EXTRA_ARGS:-}
    environment: *backend-env
    volumes:
      - upload_storage:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
      args:
        BACKEND_UV_EXTRA_ARGS: ${BACKEND_UV_EXTRA_ARGS:-}
    environment: *backend-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
      args:
        BACKEND_UV_EXTRA_ARGS: ${BACKEND_UV_EXTRA_ARGS:-}
    environment: *backend-env
    command: ["python", "-m", "app.scripts.seed"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    environment:
      VITE_API_BASE_URL: ""
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    name: ragproject_postgres_data
  qdrant_data:
    name: ragproject_qdrant_data
  ollama_data:
    name: ragproject_ollama_data
  upload_storage:
    name: ragproject_upload_storage
  neo4j_data:
    name: ragproject_neo4j_data
