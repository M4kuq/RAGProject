#:schema https://developers.openai.com/codex/config-schema.json

# =========================================================
# RAGProject Codex config
# PR / test automation friendly config
# This file MAY be committed
# =========================================================

model_provider = "openai"
model = "gpt-5.5"
review_model = "gpt-5.5"

model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "concise"
model_verbosity = "medium"

# 通常のPR対応・テスト実行では on-request を維持する。
# テスト / docker / gh / git の面倒な許可は rules で allow する。
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# 通常は cached。
# 最新仕様・脆弱性・求人調査などは必要時だけ live にする。
web_search = "cached"

allow_login_shell = true

# .env / secret / credential を読ませない
default_permissions = "rag_project_workspace"

# =========================================================
# Permissions
# =========================================================

[permissions.rag_project_workspace.filesystem]
glob_scan_max_depth = 5

[permissions.rag_project_workspace.filesystem.":project_roots"]
"." = "write"

# env / secret / credential / private key 系は読み取りも書き込みも不可
"**/.env" = "none"
"**/.env.*" = "none"
"**/*.pem" = "none"
"**/*.key" = "none"
"**/id_rsa" = "none"
"**/id_ed25519" = "none"
"**/secrets/**" = "none"
"**/*secret*.json" = "none"
"**/*secrets*.json" = "none"
"**/*credential*.json" = "none"
"**/*credentials*.json" = "none"
"**/*token*.json" = "none"

[permissions.rag_project_workspace.network]
enabled = false

# =========================================================
# Sandbox
# =========================================================

[sandbox_workspace_write]
# Docker / GitHub CLI 自体は rules で許可する。
# npm install / pip install / docker pull など、直接ネットワークが必要な作業は原則手動。
network_access = false
exclude_tmpdir_env_var = true

# =========================================================
# Windows
# =========================================================

[windows]
sandbox = "elevated"
sandbox_private_desktop = true

# =========================================================
# Features
# =========================================================

[features]
multi_agent = true
memories = true
undo = true
prevent_idle_sleep = true
skill_mcp_dependency_install = true

# =========================================================
# Tools
# =========================================================

[tools]
view_image = true

# =========================================================
# Plugins
# =========================================================

[plugins."hugging-face@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."build-web-apps@openai-curated"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = false

[plugins."spreadsheets@openai-primary-runtime"]
enabled = false

[plugins."presentations@openai-primary-runtime"]
enabled = false

# =========================================================
# Profiles
# =========================================================

[profiles.dev]
model = "gpt-5.5"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "concise"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
default_permissions = "rag_project_workspace"

[profiles.review]
model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "concise"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.deep]
model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "concise"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
default_permissions = "rag_project_workspace"

# 寝ている間など、承認で止めたくない時だけ CLI で使用。
# Codex app では root 設定を切り替える運用を推奨。
[profiles.overnight]
model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "concise"
model_verbosity = "medium"
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "cached"
default_permissions = "rag_project_workspace"

# =========================================================
# Agents
# =========================================================
# 注意:
# default_permissions などは [agents] 配下に置かない。
# ここには agents のグローバル設定だけを書く。

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800