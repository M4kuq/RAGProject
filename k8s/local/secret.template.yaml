apiVersion: v1
kind: Secret
metadata:
  name: ragproject-secret
  labels:
    app.kubernetes.io/name: ragproject
    app.kubernetes.io/component: secret-template
type: Opaque
stringData:
  # Local placeholder values only. Replace outside git for any shared cluster.
  # All keys below are injected into the app pods via envFrom/secretRef.
  #
  # REQUIRED for the local demo:
  POSTGRES_PASSWORD: rag-local-password-change-me # required: postgres auth (also referenced by postgres StatefulSet)
  DATABASE_URL: postgresql+psycopg://rag:rag-local-password-change-me@postgres:5432/rag # required: backend/worker/migrate DB connection
  SESSION_SECRET: change-me-local-k8s-session-secret # required: backend session/CSRF signing
  #
  # OPTIONAL: external LLM provider credentials. The local demo runs with
  # USE_FAKE_LLM=true (see configmap.yaml), so these are not exercised. Leave the
  # placeholders for the demo; supply real keys only if you switch a provider
  # away from the fake/lmstudio defaults. None of these are required to boot.
  LMSTUDIO_API_KEY: lm-studio-local-placeholder # optional: only used when an LM Studio provider is enabled
  OPENAI_API_KEY: "" # optional: only used if a provider is set to openai; removable if OpenAI is never used
  ANTHROPIC_API_KEY: "" # optional: only used if a provider is set to anthropic; removable if Anthropic is never used
  GEMINI_API_KEY: "" # optional: only used if a provider is set to gemini; removable if Gemini is never used
