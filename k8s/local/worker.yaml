apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app.kubernetes.io/name: ragproject
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ragproject
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ragproject
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        fsGroup: 10001
      initContainers:
        - name: wait-migration
          image: ragproject-worker:local
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - until alembic current 2>/dev/null | grep -q "(head)"; do echo "waiting for alembic head"; sleep 2; done
          envFrom:
            - configMapRef:
                name: ragproject-config
            - secretRef:
                name: ragproject-secret
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
        - name: wait-qdrant
          image: ragproject-worker:local
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - until python -m app.scripts.healthcheck http://qdrant:6333/healthz; do echo "waiting for qdrant"; sleep 2; done
          envFrom:
            - configMapRef:
                name: ragproject-config
            - secretRef:
                name: ragproject-secret
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      containers:
        - name: worker
          image: ragproject-worker:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: ragproject-config
            - secretRef:
                name: ragproject-secret
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - from app.db.session import check_database; raise SystemExit(0 if check_database() else 1)
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - from app.db.session import check_database; raise SystemExit(0 if check_database() else 1)
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: upload-storage
              mountPath: /app/storage/uploads
      volumes:
        - name: upload-storage
          persistentVolumeClaim:
            claimName: upload-storage
