services:
  backend:
    build:
      args:
        BACKEND_UV_EXTRA_ARGS: "--extra neo4j"
    environment:
      GRAPH_RETRIEVAL_ENABLED: "true"
      GRAPH_ROUTER_ENABLED: "true"
      GRAPH_STORE_PROVIDER: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me-local}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_HEALTH_CHECK_ENABLED: "true"
      NEO4J_PROJECTION_ENABLED: "true"
    volumes:
      - ./README.md:/workspace/README.md:ro
      - ./docs:/workspace/docs:ro
    depends_on:
      neo4j:
        condition: service_healthy

  worker:
    build:
      args:
        BACKEND_UV_EXTRA_ARGS: "--extra neo4j"
    environment:
      GRAPH_RETRIEVAL_ENABLED: "true"
      GRAPH_ROUTER_ENABLED: "true"
      GRAPH_STORE_PROVIDER: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me-local}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_HEALTH_CHECK_ENABLED: "true"
      NEO4J_PROJECTION_ENABLED: "true"
    depends_on:
      neo4j:
        condition: service_healthy
