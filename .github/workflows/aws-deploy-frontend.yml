name: AWS Deploy Frontend

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  FRONTEND_BUCKET_NAME: ${{ vars.FRONTEND_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}

jobs:
  deploy:
    name: build / sync S3 / invalidate CloudFront
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check deploy branch
        working-directory: .
        run: |
          if [ "$GITHUB_REF" != "refs/heads/${DEPLOY_BRANCH}" ]; then
            echo "This workflow is limited to refs/heads/${DEPLOY_BRANCH}."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Sync frontend assets
        run: aws s3 sync dist "s3://${FRONTEND_BUCKET_NAME}" --delete

      - name: Invalidate CloudFront
        working-directory: .
        run: |
          invalidation_id="$(aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)"
          {
            echo "### Frontend deployment"
            echo "- Bucket: ${FRONTEND_BUCKET_NAME}"
            echo "- Distribution: ${CLOUDFRONT_DISTRIBUTION_ID}"
            echo "- Invalidation: ${invalidation_id}"
          } >> "$GITHUB_STEP_SUMMARY"
