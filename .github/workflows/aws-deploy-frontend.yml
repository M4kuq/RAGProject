name: AWS Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      deployment_config:
        description: "Optional JSON outputs supplied by aws-demo.ps1 after a fresh apply."
        required: false
        type: string
      source_sha:
        description: "Exact planned commit SHA to build and deploy."
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-demo-runtime-deploy-AWS_ECS
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  SOURCE_SHA: ${{ inputs.source_sha }}
  FRONTEND_BUCKET_NAME: ${{ vars.FRONTEND_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
  DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}

jobs:
  deploy:
    name: build / sync S3 / invalidate CloudFront
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check deploy branch
        working-directory: .
        run: |
          if [ "$GITHUB_REF" != "refs/heads/deploy/AWS_ECS" ]; then
            echo "This workflow is limited to refs/heads/deploy/AWS_ECS."
            exit 1
          fi

      - name: Validate planned commit
        working-directory: .
        shell: bash
        run: |
          if [[ ! "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "source_sha must be a full lowercase commit SHA."
            exit 1
          fi

      - name: Checkout trusted deploy branch
        uses: actions/checkout@v4
        with:
          ref: deploy/AWS_ECS
          fetch-depth: 0

      - name: Verify planned commit belongs to deploy branch
        working-directory: .
        shell: bash
        run: |
          if ! git merge-base --is-ancestor "$SOURCE_SHA" "origin/deploy/AWS_ECS"; then
            echo "source_sha must be the deploy branch head or one of its ancestors."
            exit 1
          fi

      - name: Checkout planned commit
        working-directory: .
        shell: bash
        run: git checkout --detach "$SOURCE_SHA"

      - name: Apply lifecycle deployment config
        if: ${{ inputs.deployment_config != '' }}
        working-directory: .
        shell: bash
        env:
          DEPLOYMENT_CONFIG: ${{ inputs.deployment_config }}
        run: |
          set -euo pipefail
          jq -e '
            (.frontend_bucket_name | test("^[a-z0-9.-]+$")) and
            (.cloudfront_distribution_id | test("^[A-Z0-9]+$")) and
            (.github_deploy_role_arn | test("^arn:aws:iam::[0-9]{12}:role/[A-Za-z0-9+=,.@_/-]+-github-deploy$"))
          ' <<< "$DEPLOYMENT_CONFIG" > /dev/null
          {
            echo "FRONTEND_BUCKET_NAME=$(jq -r '.frontend_bucket_name' <<< "$DEPLOYMENT_CONFIG")"
            echo "CLOUDFRONT_DISTRIBUTION_ID=$(jq -r '.cloudfront_distribution_id' <<< "$DEPLOYMENT_CONFIG")"
            echo "AWS_DEPLOY_ROLE_ARN=$(jq -r '.github_deploy_role_arn' <<< "$DEPLOYMENT_CONFIG")"
          } >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          mask-aws-account-id: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Sync frontend assets
        run: aws s3 sync dist "s3://${FRONTEND_BUCKET_NAME}" --delete

      - name: Invalidate CloudFront
        working-directory: .
        run: |
          invalidation_id="$(aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)"
          {
            echo "### Frontend deployment"
            echo "- Bucket: ${FRONTEND_BUCKET_NAME}"
            echo "- Distribution: ${CLOUDFRONT_DISTRIBUTION_ID}"
            echo "- Invalidation: ${invalidation_id}"
          } >> "$GITHUB_STEP_SUMMARY"
