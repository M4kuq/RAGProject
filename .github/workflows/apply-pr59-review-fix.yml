name: Apply PR59 Review Fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - .github/pr59-review-fix.patch
      - .github/workflows/apply-pr59-review-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.head.ref == 'feature/pr-46-graph-schema-index-foundation')
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          persist-credentials: true

      - name: Apply review patch and remove applicator
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/pr59-review-fix.patch
          git apply --3way --index .github/pr59-review-fix.patch
          git rm .github/pr59-review-fix.patch .github/workflows/apply-pr59-review-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix remaining PR review feedback"
          git push origin HEAD:${TARGET_BRANCH}
