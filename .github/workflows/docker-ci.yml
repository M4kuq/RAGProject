name: Docker CI

on:
  pull_request:
    paths:
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "docker-compose*.yml"
      - ".dockerignore"
      - ".github/workflows/**"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ENVIRONMENT: ci
  USE_FAKE_LLM: "true"
  MODEL_NAME: fake-ci-model
  EMBEDDING_MODEL: fake-ci-embedding
  RERANKER_MODEL: fake-ci-reranker

jobs:
  compose-config:
    name: Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate CI compose config
        run: docker compose -f docker-compose.ci.yml config

      - name: Write safe compose config artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p artifacts
          docker compose -f docker-compose.ci.yml config --no-interpolate > artifacts/docker-compose.ci.rendered.yml

      - name: Upload compose config artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ragproject-ci-compose-config
          path: artifacts/docker-compose.ci.rendered.yml
          if-no-files-found: error
          retention-days: 7

  docker-build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    needs: compose-config
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            dockerfile: backend/Dockerfile
            target: backend
          - name: worker
            dockerfile: backend/Dockerfile
            target: worker
          - name: frontend
            dockerfile: frontend/Dockerfile
            target: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull BuildKit image with retry
        run: |
          for attempt in 1 2 3; do
            if docker pull moby/buildkit:buildx-stable-1; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "BuildKit image pull failed; retry ${attempt}/3"
            sleep $((attempt * 10))
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          push: false
          load: false
          provenance: false
          tags: ragproject-${{ matrix.image.name }}:ci
          cache-from: type=gha,scope=${{ matrix.image.name }}

      - name: Build image with cache update
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          push: false
          load: false
          provenance: false
          tags: ragproject-${{ matrix.image.name }}:ci
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
