name: ragproject-ci

x-backend-env: &backend-env
  APP_ENV: ci
  DATABASE_URL: postgresql+psycopg://rag:rag@postgres:5432/rag
  CORS_ALLOWED_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
  SESSION_SECRET: ci-only-change-me
  SESSION_COOKIE_NAME: rag_session
  CSRF_COOKIE_NAME: rag_csrf
  SESSION_TOKEN_BYTES: "32"
  SESSION_COOKIE_SECURE: "false"
  SESSION_COOKIE_SAMESITE: lax
  SESSION_COOKIE_MAX_AGE_SECONDS: "28800"
  CSRF_HEADER_NAME: X-CSRF-Token
  CSRF_TOKEN_BYTES: "32"
  CSRF_PRE_AUTH_MAX_AGE_SECONDS: "600"
  LOGIN_RATE_LIMIT_WINDOW_SECONDS: "300"
  LOGIN_RATE_LIMIT_MAX_ATTEMPTS: "5"
  LOGIN_RATE_LIMIT_LOCK_SECONDS: "300"
  LOGIN_RATE_LIMIT_MAX_KEYS: "10000"
  TRUSTED_PROXY_IPS: "[]"
  STORAGE_ROOT: /app/storage/uploads
  UPLOAD_MAX_BYTES: "20971520"
  UPLOAD_ALLOWED_EXTENSIONS: '[".pdf",".docx",".txt",".md",".markdown",".csv"]'
  TEMP_CHAT_TTL_MINUTES: "120"
  JOB_LEASE_SECONDS: "300"
  WORKER_POLL_INTERVAL_MS: "1000"
  WORKER_BATCH_SIZE: "1"
  WORKER_LEASE_SECONDS: "300"
  WORKER_LEASE_RENEW_INTERVAL_SECONDS: "60"
  WORKER_SHUTDOWN_GRACE_SECONDS: "30"
  WORKER_ENABLED_JOB_TYPES: none
  INGEST_CHUNK_SIZE_TOKENS: "512"
  INGEST_CHUNK_OVERLAP_TOKENS: "128"
  INGEST_MAX_EXTRACTED_TEXT_CHARS: "5000000"
  INGEST_CHUNK_PREVIEW_CHARS: "200"
  LOG_LEVEL: INFO
  PII_MASKING_ENABLED: "true"
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION_NAME: document_chunks_ci
  QDRANT_DISTANCE: Cosine
  QDRANT_CREATE_COLLECTION: "true"
  QDRANT_REQUIRED: "false"
  QDRANT_UPSERT_BATCH_SIZE: "64"
  QDRANT_TIMEOUT_SECONDS: "5"
  OLLAMA_URL: http://ollama:11434
  USE_FAKE_LLM: "true"
  MODEL_NAME: fake-ci-model
  EMBEDDING_PROVIDER: fake
  EMBEDDING_MODEL: fake-ci-embedding
  EMBEDDING_VECTOR_DIMENSION: "1024"
  EMBEDDING_FAKE_DIMENSION: "8"
  EMBEDDING_BATCH_SIZE: "32"
  RETRIEVAL_TOP_K_DEFAULT: "20"
  RETRIEVAL_TOP_K_MAX: "20"
  RERANK_PROVIDER: fake
  RERANK_TOP_N_DEFAULT: "5"
  RERANK_TOP_N_MAX: "5"
  RERANK_SCORE_MIN: "0"
  RERANK_SCORE_MAX: "1"
  RERANKER_MODEL: fake-ci-reranker
  SEARCH_SNIPPET_MAX_CHARS: "240"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    volumes:
      - postgres_ci_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant_ci_data:/qdrant/storage
    expose:
      - "6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
    environment: *backend-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
    environment: *backend-env
    command: ["python", "-m", "app.scripts.seed"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
    environment: *backend-env
    volumes:
      - upload_ci_storage:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-m", "app.scripts.healthcheck", "http://127.0.0.1:8000/ready", "database"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: worker
    environment: *backend-env
    volumes:
      - upload_ci_storage:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "from app.db.session import check_database; raise SystemExit(0 if check_database() else 1)"]
      interval: 5s
      timeout: 5s
      retries: 12

  frontend-build:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: build
    command: ["sh", "-c", "test -f dist/index.html"]

  backend-test:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: test
    environment: *backend-env
    command: ["sh", "-c", "ruff format --check . && ruff check . && mypy . && pytest"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully

  frontend-test:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    command: ["sh", "-c", "npm run lint && npm run typecheck && npm test && npm run build"]

  smoke:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
    environment: *backend-env
    command:
      [
        "sh",
        "-c",
        "python -m app.scripts.healthcheck http://backend:8000/ready database && python -m app.scripts.healthcheck http://qdrant:6333/healthz"
      ]
    depends_on:
      backend:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      worker:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully

volumes:
  postgres_ci_data:
    name: ragproject_ci_postgres_data
  qdrant_ci_data:
    name: ragproject_ci_qdrant_data
  upload_ci_storage:
    name: ragproject_ci_upload_storage
