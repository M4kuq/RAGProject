name: ragproject-ci

x-backend-env: &backend-env
  APP_ENV: ci
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag}@postgres:5432/${POSTGRES_DB:-rag}}
  CORS_ALLOWED_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
  SESSION_SECRET: ci-only-change-me
  SESSION_COOKIE_NAME: rag_session
  CSRF_COOKIE_NAME: rag_csrf
  SESSION_TOKEN_BYTES: "32"
  SESSION_COOKIE_SECURE: "false"
  SESSION_COOKIE_SAMESITE: lax
  SESSION_COOKIE_MAX_AGE_SECONDS: "28800"
  CSRF_HEADER_NAME: X-CSRF-Token
  CSRF_TOKEN_BYTES: "32"
  CSRF_PRE_AUTH_MAX_AGE_SECONDS: "600"
  LOGIN_RATE_LIMIT_WINDOW_SECONDS: "300"
  LOGIN_RATE_LIMIT_MAX_ATTEMPTS: "5"
  LOGIN_RATE_LIMIT_LOCK_SECONDS: "300"
  LOGIN_RATE_LIMIT_MAX_KEYS: "10000"
  TRUSTED_PROXY_IPS: "[]"
  STORAGE_ROOT: /app/storage/uploads
  UPLOAD_MAX_BYTES: "20971520"
  UPLOAD_ALLOWED_EXTENSIONS: '[".pdf",".docx",".txt",".md",".markdown",".csv",".xlsx",".pptx",".html",".htm",".xml"]'
  INGEST_OFFICE_MAX_PAGES: "200"
  INGEST_OFFICE_MAX_ROWS_PER_SHEET: "5000"
  INGEST_OFFICE_MAX_CELLS: "100000"
  INGEST_OFFICE_ROWS_PER_CHUNK: "25"
  INGEST_OFFICE_MAX_SLIDES: "300"
  TEMP_CHAT_TTL_MINUTES: "120"
  JOB_LEASE_SECONDS: "300"
  WORKER_POLL_INTERVAL_MS: "1000"
  WORKER_BATCH_SIZE: "1"
  WORKER_LEASE_SECONDS: "300"
  WORKER_LEASE_RENEW_INTERVAL_SECONDS: "60"
  WORKER_SHUTDOWN_GRACE_SECONDS: "30"
  WORKER_ENABLED_JOB_TYPES: graph_index_build
  INGEST_CHUNK_SIZE_TOKENS: "512"
  INGEST_CHUNK_OVERLAP_TOKENS: "128"
  INGEST_MAX_EXTRACTED_TEXT_CHARS: "5000000"
  INGEST_CHUNK_PREVIEW_CHARS: "200"
  LOG_LEVEL: INFO
  PII_MASKING_ENABLED: "true"
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION_NAME: document_chunks_ci
  QDRANT_DISTANCE: Cosine
  QDRANT_CREATE_COLLECTION: "true"
  QDRANT_REQUIRED: "false"
  QDRANT_UPSERT_BATCH_SIZE: "64"
  QDRANT_TIMEOUT_SECONDS: "5"
  OLLAMA_URL: http://ollama:11434
  USE_FAKE_LLM: "true"
  MODEL_NAME: fake-ci-model
  EMBEDDING_PROVIDER: fake
  EMBEDDING_MODEL: fake-ci-embedding
  EMBEDDING_VECTOR_DIMENSION: "1024"
  EMBEDDING_FAKE_DIMENSION: "8"
  EMBEDDING_BATCH_SIZE: "32"
  RETRIEVAL_TOP_K_DEFAULT: "20"
  RETRIEVAL_TOP_K_MAX: "20"
  RERANK_PROVIDER: fake
  RERANK_TOP_N_DEFAULT: "5"
  RERANK_TOP_N_MAX: "5"
  RERANK_SCORE_MIN: "0"
  RERANK_SCORE_MAX: "1"
  RERANKER_MODEL: fake-ci-reranker
  SEARCH_SNIPPET_MAX_CHARS: "240"
  ASK_TOP_K_DEFAULT: "5"
  ASK_RERANK_TOP_N_DEFAULT: "2"
  GENERATION_PROVIDER: fake
  GENERATION_MODEL_NAME: fake-rag-answer
  GENERATION_MAX_CONTEXT_CHARS: "6000"
  GENERATION_MAX_OUTPUT_CHARS: "2000"
  GRAPH_RETRIEVAL_ENABLED: "true"
  GRAPH_STORE_PROVIDER: neo4j
  GRAPH_EXTRACTOR_TYPE: llm
  GRAPH_EXTRACTION_PROVIDER: fake
  GRAPH_EXTRACTION_MODEL_NAME: fake-rag-answer
  GRAPH_EXTRACTION_TIMEOUT_SECONDS: "60"
  GRAPH_EXTRACTION_MAX_OUTPUT_CHARS: "12000"
  GRAPH_EXTRACTION_MAX_OUTPUT_TOKENS: "2048"
  GRAPH_EXTRACTION_MAX_ENTITIES_PER_CHUNK: "20"
  GRAPH_EXTRACTION_MAX_RELATIONS_PER_CHUNK: "40"
  GRAPH_EXTRACTION_MIN_CONFIDENCE: "0.5"
  GRAPH_RETRIEVAL_MAX_START_ENTITIES: "5"
  GRAPH_RETRIEVAL_MAX_DEPTH: "2"
  GRAPH_RETRIEVAL_MAX_PATHS: "20"
  GRAPH_RETRIEVAL_MAX_RELATIONS_PER_ENTITY: "20"
  GRAPH_RETRIEVAL_MAX_SOURCE_CHUNKS: "20"
  GRAPH_RETRIEVAL_TIMEOUT_MS: "3000"
  GRAPH_RETRIEVAL_FALLBACK_STRATEGY: hybrid
  GRAPH_ROUTER_ENABLED: "true"
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: change-me-ci
  NEO4J_DATABASE: neo4j
  NEO4J_CONNECT_TIMEOUT_SECONDS: "5"
  NEO4J_HEALTH_CHECK_ENABLED: "true"
  NEO4J_PROJECTION_ENABLED: "true"
  NEO4J_PROJECTION_CONNECT_RETRY_ATTEMPTS: "10"
  NEO4J_PROJECTION_CONNECT_RETRY_DELAY_SECONDS: "1"
  LLM_ORCHESTRATOR_TIMEOUT_SECONDS: "600"
  LANGCHAIN_AGENTIC_TIMEOUT_SECONDS: "600"
  MCP_ENABLED: "true"
  MCP_TRANSPORT: stdio
  MCP_LOCAL_ONLY: "true"
  MCP_ACTOR_MODE: mcp_local
  MCP_SNIPPET_MAX_CHARS: "240"
  MCP_TOOL_TIMEOUT_SECONDS: "30"
  MCP_ALLOW_WRITE_TOOLS: "false"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
    volumes: !reset []
    tmpfs:
      - /var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes: !reset []
    tmpfs:
      - /qdrant/storage
    expose:
      - "6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 12

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/change-me-ci
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    volumes: !reset []
    tmpfs:
      - /data
    expose:
      - "7474"
      - "7687"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/7687'"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
      args:
        BACKEND_UV_EXTRA_ARGS: "--extra neo4j"
    environment: *backend-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
      args:
        BACKEND_UV_EXTRA_ARGS: "--extra neo4j"
    environment: *backend-env
    command: ["sh", "-c", "python -m app.scripts.seed && python -m app.scripts.queue_graph_index_builds"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
      args:
        BACKEND_UV_EXTRA_ARGS: "--extra neo4j"
    environment: *backend-env
    volumes:
      - upload_ci_storage:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-m", "app.scripts.healthcheck", "http://127.0.0.1:8000/ready", "database"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: worker
      args:
        BACKEND_UV_EXTRA_ARGS: "--extra neo4j"
    environment: *backend-env
    volumes:
      - upload_ci_storage:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "from app.db.session import check_database; raise SystemExit(0 if check_database() else 1)"]
      interval: 5s
      timeout: 5s
      retries: 12

  frontend-build:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: build
    command: ["sh", "-c", "test -f dist/index.html"]

  backend-test:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: test
      args:
        BACKEND_UV_EXTRA_ARGS: "--extra neo4j"
    environment: *backend-env
    command: ["sh", "-c", "python -m app.scripts.build_demo_graph_index --limit 5 && python -m app.mcp.server --version && ruff format --check . && ruff check . && mypy . && pytest"]
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully

  frontend-test:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    command: ["sh", "-c", "npm run lint && npm run typecheck && npm test && npm run build"]

  smoke:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend
    environment: *backend-env
    command:
      [
        "sh",
        "-c",
        "python -m app.scripts.healthcheck http://backend:8000/ready database && python -m app.scripts.healthcheck http://qdrant:6333/healthz"
      ]
    depends_on:
      backend:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      worker:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully

volumes:
  upload_ci_storage:
